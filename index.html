<title>TAG BRIEF — Daily Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
body{font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
@keyframes scroll{to{transform:translateX(-50%)}}
@keyframes pulse{0%,100%{opacity:.15}50%{opacity:.25}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* THEME VARS */
:root{
–bg:#F4F5F7;–bg3:#F0F1F3;–t1:#111827;–t2:#4B5563;–t3:#9CA3AF;
–card:#FFF;–cb:#E5E7EB;–cs:0 1px 4px rgba(0,0,0,.06);–sh:#FAFBFC;–bdr:#F0F1F3;–ibg:#F9FAFB;
–ab:#EFF6FF;–abr:#BFDBFE;–ac:#2563EB;
–phb:rgba(239,68,68,.08);–phc:#DC2626;–php:rgba(239,68,68,.2);
–pmb:rgba(245,158,11,.08);–pmc:#D97706;–pmp:rgba(245,158,11,.2);
–plb:rgba(34,197,94,.06);–plc:#16A34A;–plp:rgba(34,197,94,.15);
–nav:rgba(255,255,255,.92);–nb:#E5E7EB;–hdr:rgba(244,245,247,.88);–hb:#E5E7EB;
–rc:#2563EB;–tab:#EFF6FF;–tac:#2563EB;–tic:#9CA3AF;–ebg:#FFF;–ebd:#BFDBFE
}
.dark{
–bg:#0C0E12;–bg3:#1A1E28;–t1:#E8EAF0;–t2:#9CA3B4;–t3:#5A6275;
–card:#141720;–cb:#1E2233;–cs:0 2px 8px rgba(0,0,0,.3);–sh:#181C26;–bdr:#1E2233;–ibg:#181C26;
–ab:#1A2332;–abr:#2A4060;–ac:#5B9BF0;
–phb:rgba(239,68,68,.12);–phc:#F87171;–php:rgba(239,68,68,.25);
–pmb:rgba(245,158,11,.12);–pmc:#FBBF24;–pmp:rgba(245,158,11,.25);
–plb:rgba(34,197,94,.1);–plc:#4ADE80;–plp:rgba(34,197,94,.2);
–nav:rgba(12,14,18,.92);–nb:#1E2233;–hdr:rgba(12,14,18,.88);–hb:#1E2233;
–rc:#5B9BF0;–tab:#1A2332;–tac:#5B9BF0;–tic:#5A6275;–ebg:#141720;–ebd:#2A4060
}
body{background:var(–bg);color:var(–t1)}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;position:relative}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:var(–hdr);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(–hb);padding:10px 16px;padding-top:max(env(safe-area-inset-top,10px),10px);display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:20px;font-weight:800;letter-spacing:-.03em;line-height:1.2}.hdr-title span{color:var(–ac)}
.hdr-date{font-size:11px;color:var(–t3);margin-top:1px}
.hdr-actions{display:flex;gap:6px;align-items:center}
.btn{border:none;border-radius:8px;cursor:pointer;font-weight:600;font-family:inherit;transition:all .15s}
.btn-filter{background:var(–bg3);border:1px solid var(–cb);padding:5px 10px;font-size:10px;color:var(–t3);letter-spacing:.03em}
.btn-filter.active{background:var(–phb);border-color:var(–php);color:var(–phc)}
.btn-theme{background:var(–bg3);border:1px solid var(–cb);width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px}

/* TICKER */
.ticker{overflow:hidden;background:var(–card);border-bottom:1px solid var(–cb);padding:8px 0}
.ticker-inner{display:flex;gap:24px;animation:scroll 60s linear infinite;white-space:nowrap;width:max-content}
.ticker-item{font-size:11px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.ticker-cat{font-size:9px;padding:1px 4px;border-radius:3px;background:var(–bdr);color:var(–t3);font-weight:700}
.ticker-name{color:var(–t2)}.ticker-price{font-weight:700;color:var(–t1)}
.ticker-up{color:var(–plc);font-weight:600}.ticker-down{color:var(–phc);font-weight:600}

/* EXEC SUMMARY */
.exec{padding:14px 16px;border-radius:12px;border:1px solid var(–ebd);background:var(–ebg);margin-bottom:12px;box-shadow:var(–cs)}
.exec-label{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.exec-label span:last-child{font-size:12px;font-weight:700;color:var(–ac);letter-spacing:.05em;text-transform:uppercase}
.exec p{font-size:13px;line-height:1.6;color:var(–t2)}

/* QUICK ACTIONS */
.qbar{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.qbar-item{flex:0 0 auto;padding:10px 14px;border-radius:10px;background:var(–card);border:1px solid var(–cb);display:flex;align-items:center;gap:8px;cursor:pointer;white-space:nowrap}
.qbar-item span:first-child{font-size:14px}
.qbar-item span:last-child{font-size:11px;font-weight:600}

/* SECTIONS */
.section{margin-bottom:12px;border-radius:12px;border:1px solid var(–cb);background:var(–card);overflow:hidden;box-shadow:var(–cs);animation:fadeUp .3s ease both}
.sec-hdr{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;background:var(–sh)}
.sec-hdr.open{border-bottom:1px solid var(–bdr)}
.sec-icon{font-size:20px}
.sec-title{font-size:15px;font-weight:700;letter-spacing:-.01em}
.sec-meta{font-size:11px;color:var(–t3);margin-top:2px}
.sec-arrow{transition:transform .2s;color:var(–t3);font-size:14px;margin-left:auto}
.sec-arrow.collapsed{transform:rotate(-90deg)}

/* ITEMS */
.item{padding:14px 16px;cursor:pointer;border-bottom:1px solid var(–bdr);transition:background .15s}
.item:hover,.item.open{background:var(–ibg)}
.item-top{display:flex;gap:10px;align-items:flex-start}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;padding:2px 8px;border-radius:4px;line-height:16px;flex-shrink:0}
.badge-high{background:var(–phb);color:var(–phc);border:1px solid var(–php)}
.badge-medium{background:var(–pmb);color:var(–pmc);border:1px solid var(–pmp)}
.badge-low{background:var(–plb);color:var(–plc);border:1px solid var(–plp)}
.item-headline{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:4px}
.item-summary{font-size:13px;line-height:1.5;color:var(–t2)}
.item-arrow{transition:transform .2s;color:var(–t3);font-size:12px;flex-shrink:0;padding-top:4px}
.item-arrow.open{transform:rotate(180deg)}
.item-detail{margin-top:12px;margin-left:52px;padding-top:12px;border-top:1px solid var(–bdr)}
.item-detail p{font-size:13px;line-height:1.65;color:var(–t2);margin-bottom:8px}
.item-detail .src{font-size:11px;color:var(–t3);font-style:italic}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(–nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(–nb);display:flex;justify-content:space-around;align-items:center;padding:5px 2px;padding-bottom:max(env(safe-area-inset-bottom,5px),5px);z-index:100}
.bnav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 2px;min-width:0}
.bnav-btn span:first-child{font-size:16px}
.bnav-btn span:last-child{font-size:8px;font-weight:600;color:var(–t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:42px}

/* MODAL */
.modal-bg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(–bg);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:420px;max-height:70vh;overflow:auto}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(–t3);margin:0 auto 12px;opacity:.4}
.modal-title{font-size:16px;font-weight:700;text-align:center;margin-bottom:4px}
.modal-sub{font-size:11px;color:var(–t3);text-align:center;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 6px;text-align:left;color:var(–t3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(–bdr)}
td{padding:10px 6px;border-bottom:1px solid var(–bdr);color:var(–t2)}
td.tag-price{color:var(–ac);font-weight:700}
td.tag-turn{color:var(–ac);font-weight:600;font-size:11px}
.modal-note{margin-top:12px;font-size:11px;color:var(–t3);line-height:1.5}
.modal-note strong{color:var(–ac)}
.cal-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(–bdr)}
.cal-date{width:60px;flex-shrink:0;font-size:12px;font-weight:600;color:var(–t2)}
.cal-title{font-size:13px;font-weight:600}.cal-cat{font-size:10px;color:var(–t3);margin-top:2px}
.cal-status{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.05em}

/* FOOTER */
.footer{text-align:center;padding:20px 0;color:var(–t3);font-size:11px;line-height:1.6}
.footer strong{font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.content{padding-bottom:86px}
.main-pad{padding:12px 12px 0}

/* SKELETON */
.sk{background:var(–t3);animation:pulse 1.5s ease-in-out infinite;border-radius:4px}
.hidden{display:none}
